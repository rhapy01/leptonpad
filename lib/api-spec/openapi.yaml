openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LeptonPad API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: content
    description: Content management
  - name: categories
    description: Content categories
  - name: payments
    description: USDC payment operations
  - name: earnings
    description: Creator earnings
  - name: ai
    description: AI pricing agent
  - name: stats
    description: Platform statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
    put:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users/me/purchases:
    get:
      operationId: getMyPurchases
      tags: [users]
      summary: Get current user's purchase history
      responses:
        "200":
          description: List of purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Purchase"
        "401":
          description: Unauthorized

  /users/{clerkId}/verify:
    post:
      operationId: verifyCreator
      tags: [users]
      summary: Grant or revoke verification badge (admin only)
      parameters:
        - name: clerkId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (not admin)
        "404":
          description: User not found

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all content categories
      responses:
        "200":
          description: All categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /content:
    get:
      operationId: listContent
      tags: [content]
      summary: List content feed
      parameters:
        - name: categories
          in: query
          schema:
            type: string
          description: Comma-separated category slugs to filter by
        - name: type
          in: query
          schema:
            type: string
            enum: [article, audio, video]
          description: Filter by content type
        - name: creatorId
          in: query
          schema:
            type: string
          description: Filter by creator Clerk user ID
        - name: q
          in: query
          schema:
            type: string
          description: Search titles, previews, and creator names
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated content list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentListResponse"
    post:
      operationId: createContent
      tags: [content]
      summary: Create new content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentInput"
      responses:
        "201":
          description: Created content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Content"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized

  /content/{id}:
    get:
      operationId: getContent
      tags: [content]
      summary: Get single content item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Content item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentDetail"
        "404":
          description: Not found
    put:
      operationId: updateContent
      tags: [content]
      summary: Update content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentUpdate"
      responses:
        "200":
          description: Updated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Content"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteContent
      tags: [content]
      summary: Delete content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /content/{id}/next:
    get:
      operationId: getNextContent
      tags: [content]
      summary: Get next content item in the same category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Next content item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Content"
        "204":
          description: No next item found

  /content/{id}/view:
    post:
      operationId: trackContentView
      tags: [content]
      summary: Track a view on content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: View tracked

  /payments/config:
    get:
      operationId: getPaymentConfig
      tags: [payments]
      summary: Get Circle Gateway / x402 payment configuration
      responses:
        "200":
          description: Payment rail config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentConfig"

  /payments/gateway/{contentId}:
    get:
      operationId: payGatewayUnlock
      tags: [payments]
      summary: Unlock content via x402 Gateway nanopayment
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unlock result after verified payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnlockResult"
        "402":
          description: Payment required — x402 PAYMENT-REQUIRED header included
        "401":
          description: Unauthorized

  /payments/unlock:
    post:
      operationId: unlockContent
      tags: [payments]
      summary: Unlock content with USDC payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnlockInput"
      responses:
        "200":
          description: Unlock result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnlockResult"
        "400":
          description: Payment failed
        "401":
          description: Unauthorized

  /payments/check/{contentId}:
    get:
      operationId: checkContentAccess
      tags: [payments]
      summary: Check if current user has paid for content
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Access status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessStatus"

  /earnings/summary:
    get:
      operationId: getEarningsSummary
      tags: [earnings]
      summary: Get creator earnings summary
      responses:
        "200":
          description: Earnings summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EarningsSummary"
        "401":
          description: Unauthorized

  /earnings/content:
    get:
      operationId: getEarningsByContent
      tags: [earnings]
      summary: Get earnings breakdown per content item
      responses:
        "200":
          description: Per-content earnings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContentEarnings"
        "401":
          description: Unauthorized

  /earnings/recent:
    get:
      operationId: getRecentPayments
      tags: [earnings]
      summary: Get recent payment feed for creator
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Recent payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentEvent"
        "401":
          description: Unauthorized

  /ai/suggestions:
    get:
      operationId: listAiSuggestions
      tags: [ai]
      summary: List AI pricing suggestions for creator's content
      responses:
        "200":
          description: Active suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiSuggestion"
        "401":
          description: Unauthorized

  /ai/suggest/{contentId}:
    post:
      operationId: requestAiSuggestion
      tags: [ai]
      summary: Request AI pricing suggestion for a content item
      parameters:
        - name: contentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: AI suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSuggestion"
        "401":
          description: Unauthorized

  /ai/suggestions/{id}/apply:
    post:
      operationId: applyAiSuggestion
      tags: [ai]
      summary: Apply an AI pricing suggestion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Content"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /ai/suggestions/{id}/dismiss:
    post:
      operationId: dismissAiSuggestion
      tags: [ai]
      summary: Dismiss an AI pricing suggestion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Dismissed
        "401":
          description: Unauthorized

  /stats/platform:
    get:
      operationId: getPlatformStats
      tags: [stats]
      summary: Get platform-wide statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        name:
          type: string
        email:
          type: string
        imageUrl:
          type: ["string", "null"]
        walletAddress:
          type: ["string", "null"]
        selectedCategories:
          type: array
          items:
            type: string
        onboardingComplete:
          type: boolean
        verified:
          type: boolean
        isAdmin:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - clerkId
        - name
        - email
        - imageUrl
        - walletAddress
        - selectedCategories
        - onboardingComplete
        - verified
        - isAdmin
        - createdAt

    UserUpdate:
      type: object
      properties:
        walletAddress:
          type: string
        selectedCategories:
          type: array
          items:
            type: string
        onboardingComplete:
          type: boolean
        name:
          type: string

    Category:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
      required:
        - id
        - slug
        - name
        - description
        - icon

    Content:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [article, audio, video]
        categorySlug:
          type: string
        categoryName:
          type: string
        price:
          type: number
        creatorId:
          type: string
        creatorName:
          type: string
        creatorImageUrl:
          type: ["string", "null"]
        creatorVerified:
          type: boolean
        previewText:
          type: ["string", "null"]
        coverImageUrl:
          type: ["string", "null"]
        audioUrl:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        viewCount:
          type: integer
        purchaseCount:
          type: integer
        published:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - title
        - type
        - categorySlug
        - categoryName
        - price
        - creatorId
        - creatorName
        - creatorImageUrl
        - creatorVerified
        - previewText
        - coverImageUrl
        - audioUrl
        - videoUrl
        - viewCount
        - purchaseCount
        - published
        - createdAt

    ContentDetail:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [article, audio, video]
        categorySlug:
          type: string
        categoryName:
          type: string
        price:
          type: number
        creatorId:
          type: string
        creatorName:
          type: string
        creatorImageUrl:
          type: ["string", "null"]
        body:
          type: ["string", "null"]
        previewText:
          type: ["string", "null"]
        coverImageUrl:
          type: ["string", "null"]
        audioUrl:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        viewCount:
          type: integer
        purchaseCount:
          type: integer
        readingTimeMinutes:
          type: ["integer", "null"]
        published:
          type: boolean
        createdAt:
          type: string
        hasAccess:
          type: boolean
        creatorVerified:
          type: boolean
      required:
        - id
        - title
        - type
        - categorySlug
        - categoryName
        - price
        - creatorId
        - creatorName
        - creatorImageUrl
        - creatorVerified
        - body
        - previewText
        - coverImageUrl
        - audioUrl
        - videoUrl
        - viewCount
        - purchaseCount
        - readingTimeMinutes
        - published
        - createdAt
        - hasAccess

    ContentInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        type:
          type: string
          enum: [article, audio, video]
        categorySlug:
          type: string
        body:
          type: string
        previewText:
          type: string
        coverImageUrl:
          type: string
          description: Uploaded file path or absolute URL
        audioUrl:
          type: string
        videoUrl:
          type: string
        price:
          type: number
          minimum: 0
        published:
          type: boolean
      required:
        - title
        - type
        - categorySlug
        - price
        - coverImageUrl

    ContentUpdate:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
        previewText:
          type: string
        coverImageUrl:
          type: string
          description: Uploaded file path or absolute URL
        audioUrl:
          type: string
        videoUrl:
          type: string
        price:
          type: number
          minimum: 0
        published:
          type: boolean

    ContentListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Content"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer
      required:
        - items
        - total
        - offset
        - limit

    UnlockInput:
      type: object
      properties:
        contentId:
          type: integer
        txHash:
          type: ["string", "null"]
      required:
        - contentId

    UnlockResult:
      type: object
      properties:
        success:
          type: boolean
        paymentId:
          type: integer
        contentId:
          type: integer
        amountPaid:
          type: number
        creatorReceives:
          type: number
        settledAt:
          type: string
      required:
        - success
        - paymentId
        - contentId
        - amountPaid
        - creatorReceives
        - settledAt

    AccessStatus:
      type: object
      properties:
        hasAccess:
          type: boolean
        paymentId:
          type: ["integer", "null"]
      required:
        - hasAccess
        - paymentId

    PaymentConfig:
      type: object
      properties:
        enabled:
          type: boolean
        mockMode:
          type: boolean
        chainId:
          type: integer
        network:
          type: string
        chainName:
          type: string
        facilitatorUrl:
          type: string
        sellerAddress:
          type: ["string", "null"]
        minPrice:
          type: number
        creatorShare:
          type: number
      required:
        - enabled
        - mockMode
        - chainId
        - network
        - chainName
        - facilitatorUrl
        - sellerAddress
        - minPrice
        - creatorShare

    Purchase:
      type: object
      properties:
        id:
          type: integer
        contentId:
          type: integer
        contentTitle:
          type: string
        contentType:
          type: string
        creatorName:
          type: string
        amountPaid:
          type: number
        paidAt:
          type: string
      required:
        - id
        - contentId
        - contentTitle
        - contentType
        - creatorName
        - amountPaid
        - paidAt

    EarningsSummary:
      type: object
      properties:
        totalEarnedAllTime:
          type: number
        thisWeekEarnings:
          type: number
        totalPurchases:
          type: integer
        totalViews:
          type: integer
        conversionRate:
          type: number
      required:
        - totalEarnedAllTime
        - thisWeekEarnings
        - totalPurchases
        - totalViews
        - conversionRate

    ContentEarnings:
      type: object
      properties:
        contentId:
          type: integer
        title:
          type: string
        type:
          type: string
        price:
          type: number
        views:
          type: integer
        purchases:
          type: integer
        conversionRate:
          type: number
        totalEarned:
          type: number
        hasSuggestion:
          type: boolean
        publishedAt:
          type: string
      required:
        - contentId
        - title
        - type
        - price
        - views
        - purchases
        - conversionRate
        - totalEarned
        - hasSuggestion
        - publishedAt

    PaymentEvent:
      type: object
      properties:
        id:
          type: integer
        contentId:
          type: integer
        contentTitle:
          type: string
        readerName:
          type: string
        amount:
          type: number
        creatorAmount:
          type: number
        paidAt:
          type: string
      required:
        - id
        - contentId
        - contentTitle
        - readerName
        - amount
        - creatorAmount
        - paidAt

    AiSuggestion:
      type: object
      properties:
        id:
          type: integer
        contentId:
          type: integer
        contentTitle:
          type: string
        currentPrice:
          type: number
        suggestedPrice:
          type: number
        action:
          type: string
          enum: [raise, lower, keep]
        reasoning:
          type: string
        conversionRate:
          type: number
        status:
          type: string
          enum: [pending, applied, dismissed]
        createdAt:
          type: string
      required:
        - id
        - contentId
        - contentTitle
        - currentPrice
        - suggestedPrice
        - action
        - reasoning
        - conversionRate
        - status
        - createdAt

    VerifyInput:
      type: object
      properties:
        verified:
          type: boolean
      required:
        - verified

    PlatformStats:
      type: object
      properties:
        totalUsdcPaid:
          type: number
        totalCreators:
          type: integer
        totalContent:
          type: integer
        totalPayments:
          type: integer
        since:
          type: string
      required:
        - totalUsdcPaid
        - totalCreators
        - totalContent
        - totalPayments
        - since
